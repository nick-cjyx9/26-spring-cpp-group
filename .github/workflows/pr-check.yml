name: PR Check

on:
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: PR Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Windows: set up the MSVC developer environment (cl.exe on PATH)
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        working-directory: campus-rpg
        env:
          CXX: ${{ runner.os == 'Windows' && 'cl.exe' || 'g++' }}
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: campus-rpg
        run: cmake --build build --parallel

      - name: Test
        working-directory: campus-rpg
        run: ctest --test-dir build --output-on-failure

      - name: Lint / Basic checks
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Repository structure check"
          test -f campus-rpg/CMakeLists.txt
          test -f campus-rpg/tests/CMakeLists.txt
          test -f campus-rpg/tests/test_core.cpp
