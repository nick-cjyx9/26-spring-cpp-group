name: PR Check

on:
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: PR Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: windows-msvc-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Windows: set up the MSVC developer environment (cl.exe on PATH)
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        working-directory: campus-rpg
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        working-directory: campus-rpg
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Test
        working-directory: campus-rpg
        run: ctest --preset ${{ matrix.preset }}
