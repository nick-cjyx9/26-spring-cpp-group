name: Auto Build

on:
  push:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Auto Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Windows: set up the MSVC developer environment (cl.exe on PATH)
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        working-directory: campus-rpg
        run: cmake --preset windows-msvc-release

      - name: Build
        working-directory: campus-rpg
        run: cmake --build --preset windows-msvc-release --parallel

      - name: Test
        working-directory: campus-rpg
        run: ctest --preset windows-msvc-release

      - name: Package artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item campus-rpg/build/windows-msvc-release/Release/CampusRPG.exe dist/
          Copy-Item campus-rpg/build/windows-msvc-release/_deps/sfml-build/lib/Release/*.dll dist/ -ErrorAction SilentlyContinue
          Copy-Item campus-rpg/build/windows-msvc-release/Release/*.dll dist/ -ErrorAction SilentlyContinue
          Copy-Item campus-rpg/resources dist/ -Recurse -Force
          Get-ChildItem dist -Recurse | Select-Object -ExpandProperty FullName | Sort-Object

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: CampusRPG-windows
          path: dist/
          if-no-files-found: error
